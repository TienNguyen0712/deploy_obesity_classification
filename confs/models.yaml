models:
  logistic_regression:
    name: "Logistic Regression"
    class_name: "LogisticRegression"
    params:
      max_iter: 1000
      random_state: 42

  decision_tree:
    name: "Decision Tree"
    class_name: "DecisionTreeClassifier"
    params:
      random_state: 42

  random_forest:
    name: "Random Forest"
    class_name: "RandomForestClassifier"
    params:
      n_estimators: 100
      random_state: 42

  support_vector_machine:
    name: "Support Vector Machine"
    class_name: "SVC"
    params:
      kernel: "rbf"
      random_state: 42

  k_nearest_neighbors:
    name: "K-Nearest Neighbors"
    class_name: "KNeighborsClassifier"
    params:
      n_neighbors: 5
